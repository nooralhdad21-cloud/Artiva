<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Mini Canva Editor</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: white;
}

.toolbar {
  padding: 10px;
  background: #222;
}

button {
  padding: 10px;
  margin-right: 5px;
  cursor: pointer;
}

#canvas {
  width: 100%;
  height: 90vh;
  background: #fff;
  position: relative;
  overflow: hidden;
}

.text {
  position: absolute;
  padding: 5px 10px;
  background: rgba(0,0,0,0.1);
  cursor: move;
}
</style>

</head>
<body>

<div class="toolbar">
  <button onclick="addText()">➕ إضافة نص</button>
  <button onclick="save()">💾 حفظ</button>
  <button onclick="clearCanvas()">🗑️ مسح</button>
</div>

<div id="canvas"></div>

<script>
let elements = JSON.parse(localStorage.getItem("design")) || [];

function render() {
  const canvas = document.getElementById("canvas");
  canvas.innerHTML = "";

  elements.forEach((el, index) => {
    let div = document.createElement("div");
    div.className = "text";
    div.innerText = el.text;
    div.style.left = el.x + "px";
    div.style.top = el.y + "px";

    // سحب
    let offsetX, offsetY;

    div.onmousedown = function(e) {
      offsetX = e.offsetX;
      offsetY = e.offsetY;

      document.onmousemove = function(e) {
        el.x = e.pageX - offsetX;
        el.y = e.pageY - offsetY;
        render();
      };

      document.onmouseup = function() {
        document.onmousemove = null;
        save();
      };
    };

    canvas.appendChild(div);
  });
}

function addText() {
  elements.push({
    text: "نص جديد",
    x: 50,
    y: 50
  });
  render();
  save();
}

function save() {
  localStorage.setItem("design", JSON.stringify(elements));
}

function clearCanvas() {
  elements = [];
  save();
  render();
}

// تحميل عند فتح الصفحة
render();
</script>

</body>
</html>
