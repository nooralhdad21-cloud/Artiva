<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام الملاحة الذكي</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: Arial, sans-serif;
        }

        /* الخريطة في الخلفية للتمويه */
        .map-background {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            filter: grayscale(50%) brightness(40%);
        }

        /* حاوية الفيديو */
        .video-container {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -60%);
            width: 85%; height: 65%;
            z-index: 10;
            border: 3px solid #333;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            background: #000;
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* شريط التحكم السفلي بأزرار كبيرة */
        .controls {
            position: absolute;
            bottom: 0; width: 100%;
            height: 80px;
            background: rgba(30, 30, 30, 0.9);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 20;
            backdrop-filter: blur(5px);
        }

        .btn {
            background: #444;
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            min-width: 100px;
        }

        .btn-refresh { background: #d32f2f; } /* أحمر للتحديث */
        .btn-home { background: #1976d2; }    /* أزرق للرئيسية */

        /* إخفاء الخريطة وإظهار الفيديو بملء الشاشة عند الحاجة */
        .full-screen { width: 100% !important; height: 100% !important; top: 0 !important; left: 0 !important; transform: none !important; border: none !important; }
    </style>
</head>
<body>

    <iframe class="map-background" 
        src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d106666.03422177501!2d44.3610255!3d33.3128059!2m3!1f0!2f0!3f0!3m2!1i1024!2i740!4f13.1!5e0!3m2!1sar!2siq!4v1710000000000!5m2!1sar!2siq">
    </iframe>

    <div class="video-container" id="player">
        <iframe src="https://www.youtube.com/embed/videoseries?list=PLuvpxm9Y_QK6pU-o9f_V_5KIn0zU50G9j&autoplay=1&mute=0" 
            allow="autoplay; encrypted-media" allowfullscreen>
        </iframe>
    </div>

    <div class="controls">
        <button class="btn btn-home" onclick="changeVideo('dQw4w9WgXcQ')">فيديو 1</button>
        <button class="btn btn-home" onclick="changeVideo('7wtfhZwyrcc')">فيديو 2</button>
        <button class="btn btn-refresh" onclick="location.reload()">تحديث</button>
    </div>

    <script>
        function changeVideo(id) {
            const iframe = document.querySelector('.video-container iframe');
            iframe.src = `https://www.youtube.com/embed/${id}?autoplay=1`;
        }
    </script>
</body>
</html>
