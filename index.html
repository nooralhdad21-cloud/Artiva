<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarLink Designer | المهندس نورالدين</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar no-print">
            <div class="logo">🚗 CarLink <span>Pro</span></div>
            
            <div class="tool-section">
                <h3>🎨 اختر المظهر</h3>
                <div class="template-grid">
                    <button class="tpl-btn gold" onclick="setTemplate('gold')">ذهبي ملكي</button>
                    <button class="tpl-btn red" onclick="setTemplate('red')">رياضي أحمر</button>
                    <button class="tpl-btn blue" onclick="setTemplate('blue')">أزرق كلاسيك</button>
                </div>
            </div>

            <div class="tool-section">
                <h3>✍️ البيانات الحية</h3>
                <input type="text" id="inName" placeholder="الاسم (مثلاً: صاحب السيارة)" onkeyup="syncData()">
                <input type="text" id="inPhone" placeholder="رقم الهاتف" onkeyup="syncData()">
                <textarea id="inMsg" placeholder="رسالة الاعتذار..." onkeyup="syncData()"></textarea>
            </div>

            <div class="tool-section buttons">
                <button class="btn-save" onclick="saveAsImage()">💾 حفظ كصورة PNG</button>
                <button class="btn-print" onclick="window.print()">🖨️ طباعة فورية</button>
            </div>
            
            <div class="dev-credits">
                تطوير المهندس نورالدين صباح <br>
                @eng.nooraldein
            </div>
        </aside>

        <main class="preview-area">
            <div id="cardCanvas" class="card tpl-gold">
                <div class="card-content">
                    <div id="outMsg" class="card-header">أعتذر عن الوقوف الخاطئ</div>
                    <div class="phone-box">
                        <span id="outPhone">07XXXXXXXXX</span>
                    </div>
                    <h2 id="outName">صاحب السيارة</h2>
                    
                    <div class="card-footer">
                        <div class="rights">CarLink 2026 | Developed by Eng. Nooraldein</div>
                        <div class="url-text">nooralhdad21-cloud.github.io/carlink</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
