<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CarLink Pro | المهندس نورالدين صباح</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* --- CSS: التنسيق البرو المتجاوب --- */
        :root {
            --gold: #d4af37;
            --accent: #00d2ff;
            --dark-bg: #0a0e17;
            --panel-bg: #161e2d;
        }

        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; background: var(--dark-bg); color: white; 
            height: 100vh; overflow: hidden; display: flex; flex-direction: column; 
        }

        /* حاوية العرض العلوي (Preview) */
        .preview-area {
            flex: 1; display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, #1e293b 0%, #0a0e17 100%);
            padding: 20px; position: relative;
        }

        /* تصميم البطاقة الذكية */
        .main-card {
            width: 100%; max-width: 450px; aspect-ratio: 1.6 / 1;
            border-radius: 20px; padding: 30px; position: relative;
            display: flex; flex-direction: column; justify-content: center;
            text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            transition: transform 0.3s ease;
        }

        /* القوالب (Templates) */
        .tpl-luxury { background: #000; border: 4px solid var(--gold); color: #fff; }
        .tpl-sport { background: #1e1b4b; border-right: 18px solid #ef4444; color: #fff; }
        .tpl-modern { background: #fff; border: 1px solid #ddd; color: #000 !important; }

        .card-header { font-size: 14px; opacity: 0.8; letter-spacing: 1px; margin-bottom: 5px; }
        .phone-display { font-size: clamp(28px, 9vw, 44px); font-weight: 900; margin: 10px 0; line-height: 1; }
        .msg-display { font-size: clamp(12px, 3.5vw, 16px); opacity: 0.9; margin: 0; }
        #outName { font-size: 18px; font-weight: 700; margin-top: 10px; opacity: 0.7; }

        .card-footer {
            position: absolute; bottom: 15px; width: 100%; left: 0;
            font-size: 9px; opacity: 0.5; text-align: center;
        }

        /* لوحة التحكم السفلية (Editor) */
        .editor-panel {
            background: var(--panel-bg); padding: 20px;
            border-top: 2px solid #2d3748; border-radius: 25px 25px 0 0;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.4); z-index: 10;
        }

        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn {
            flex: 1; padding: 12px; border: none; border-radius: 12px;
            background: #2d3748; color: white; cursor: pointer; font-weight: bold;
        }
        .tab-btn.active { background: var(--accent); color: #000; }

        .inputs input, .inputs textarea {
            width: 100%; background: #0a0e17; border: 1px solid #334155;
            padding: 12px; border-radius: 10px; color: white; margin-bottom: 10px;
            outline: none; font-size: 14px; resize: none;
        }

        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-save { background: var(--accent); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-print { background: transparent; color: white; border: 1px solid white; padding: 15px; border-radius: 12px; cursor: pointer; }

        .rights-text { text-align: center; font-size: 10px; opacity: 0.5; margin-top: 10px; }

        /* تعديلات الشاشات الكبيرة (Desktop) */
        @media (min-width: 768px) {
            body { flex-direction: row; }
            .editor-panel { width: 400px; height: 100vh; border-radius: 0; border-left: 2px solid #2d3748; }
            .preview-area { height: 100vh; }
        }

        /* تنسيق الطباعة */
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; }
            .preview-area { background: none; }
            .main-card { 
                position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
                box-shadow: none !important; border: 2px solid #000;
            }
        }
    </style>
</head>
<body>

    <section class="preview-area">
        <div id="cardBox" class="main-card tpl-luxury">
            <div class="card-header">CARLINK SMART SYSTEM</div>
            <p id="outMsg" class="msg-display">أعتذر عن الوقوف الخاطئ، يرجى الاتصال بي</p>
            <div class="phone-display">
                <span id="outPhone">07701109692</span>
            </div>
            <h2 id="outName">المهندس نورالدين صباح</h2>
            <div class="card-footer">
                Developed by: Eng. Nooraldein Sabah | nooralhdad21-cloud.github.io/carlink
            </div>
        </div>
    </section>

    <aside class="editor-panel no-print">
        <div class="tabs">
            <button class="tab-btn active" onclick="setTpl('luxury', this)">ملكي</button>
            <button class="tab-btn" onclick="setTpl('sport', this)">رياضي</button>
            <button class="tab-btn" onclick="setTpl('modern', this)">عصري</button>
        </div>

        <div class="inputs">
            <input type="text" id="inName" placeholder="الاسم الكامل" oninput="updateLive()">
            <input type="tel" id="inPhone" placeholder="رقم الهاتف" oninput="updateLive()">
            <textarea id="inMsg" rows="2" placeholder="رسالة الاعتذار..." oninput="updateLive()"></textarea>
        </div>

        <div class="actions">
            <button class="btn-save" onclick="takeShot()">💾 حفظ الصورة</button>
            <button class="btn-print" onclick="window.print()">🖨️ طباعة A4</button>
        </div>

        <p class="rights-text">حقوق التصميم محفوظة للمهندس نورالدين صباح 2026</p>
    </aside>
